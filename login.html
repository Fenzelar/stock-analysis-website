<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - StockVerse</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-box">
            <h2>ยินดีต้อนรับกลับมา</h2>
            <p class="auth-subtitle">เข้าสู่ระบบเพื่อจัดการพอร์ตและดูข้อมูลหุ้นของคุณ</p>
            <form id="loginForm" action="dashboard.html">
                <div class="form-group">
                    <label for="email">อีเมล</label>
                    <input type="email" id="email" placeholder="example@email.com" required value="suriya.t@stockverse.com">
                </div>
                <div class="form-group">
                    <label for="password">รหัสผ่าน</label>
                    <input type="password" id="password" placeholder="••••••••" required value="12345678">
                </div>
                <button type="submit" class="btn-auth">เข้าสู่ระบบ</button>
            </form>
            <p class="auth-footer">ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a></p>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
